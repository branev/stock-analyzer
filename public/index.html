<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Price Analyzer</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="vendor/pico-2.0.6.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <!-- app.js MUST load before alpine.js. Both have defer so they execute in
         document order after parsing. app.js registers an alpine:init listener
         which Alpine fires during its auto-start; if alpine.js loaded first,
         the event would have already fired before the listener was attached. -->
    <script defer src="app.js"></script>
    <script defer src="vendor/alpine-3.14.9.min.js"></script>
  </head>
  <body>
    <main class="container" x-data="analyzer">
      <header>
        <div class="headline-stack">
          <span class="pill pill--charcoal">Stock</span>
          <span class="pill pill--white">price</span>
          <span class="pill pill--neon">analyzer</span>
        </div>
        <p class="eyebrow" x-text="header.coverage">Loading coverage period…</p>
      </header>

      <section>
        <p class="intro">
          Please pick a slice of the available period to analyse.
        </p>
        <form @submit.prevent="analyse">
          <fieldset>
            <div class="date-range">
              <label for="from">
                From
                <input
                  type="datetime-local"
                  id="from"
                  lang="en-GB"
                  x-model="form.from"
                  :min="form.minLocal"
                  :max="form.to || form.maxLocal"
                  :aria-invalid="(invalidDateError || fromError) ? 'true' : null"
                  @click="$event.target.showPicker?.()"
                />
                <small x-show="fromError" x-text="fromError" class="field-error"></small>
              </label>

              <label for="to">
                To
                <input
                  type="datetime-local"
                  id="to"
                  lang="en-GB"
                  x-model="form.to"
                  :min="form.from || form.minLocal"
                  :max="form.maxLocal"
                  :aria-invalid="(invalidDateError || toError) ? 'true' : null"
                  @click="$event.target.showPicker?.()"
                />
                <small x-show="toError" x-text="toError" class="field-error"></small>
              </label>
            </div>

            <label for="funds">
              Available funds (USD, optional)
              <input
                type="number"
                id="funds"
                min="0"
                step="1"
                x-model.number="form.funds"
                placeholder="e.g. 1000"
              />
              <small>Leave blank to see profit per share only.</small>
            </label>
          </fieldset>

          <button type="submit" :disabled="!canAnalyse" :aria-busy="state.loading">
            Analyse
          </button>

          <p
            x-show="state.error"
            x-text="displayedError"
            role="alert"
            class="error"
          ></p>
        </form>
      </section>

      <section
        x-show="state.result || state.nullResult"
        aria-live="polite"
      >
        <h2>Result</h2>

        <p x-show="state.nullResult">No profitable trade in this window.</p>

        <template x-if="state.result">
          <div>
            <p class="result-window">
              For window
              <span x-text="formatPickerTime(state.result.window.from) + ' UTC'"></span>
              →
              <span x-text="formatPickerTime(state.result.window.to) + ' UTC'"></span>:
            </p>
            <p>
              Buy at
              <strong x-text="formatPickerTime(state.result.buy.time) + ' UTC'"></strong>
              for
              <strong x-text="formatCurrency(state.result.buy.price)"></strong>,<br />
              sell at
              <strong x-text="formatPickerTime(state.result.sell.time) + ' UTC'"></strong>
              for
              <strong x-text="formatCurrency(state.result.sell.price)"></strong>,<br />
              profit
              <strong x-text="formatCurrency(state.result.profitPerShare)"></strong>
              per share.
            </p>

            <p x-show="hasFunds">
              With
              <strong x-text="formatCurrency(form.funds)"></strong>
              you could have bought
              <strong x-text="formatInteger(sharesAffordable)"></strong>
              shares for
              <strong x-text="formatCurrency(totalProfit)"></strong>
              total profit.
            </p>

            <details>
              <summary>Show math</summary>
              <ul>
                <li>
                  Per-share profit:
                  <strong x-text="formatCurrency(state.result.profitPerShare)"></strong>
                </li>
                <template x-if="hasFunds">
                  <li>
                    Shares affordable:
                    <strong x-text="formatInteger(sharesAffordable)"></strong>
                    (<span x-text="formatCurrency(form.funds)"></span>
                    ÷
                    <span x-text="formatCurrency(state.result.buy.price)"></span>,
                    floor)
                  </li>
                </template>
                <template x-if="hasFunds">
                  <li>
                    Total profit:
                    <strong x-text="formatCurrency(totalProfit)"></strong>
                    (<span x-text="formatInteger(sharesAffordable)"></span>
                    ×
                    <span x-text="formatCurrency(state.result.profitPerShare)"></span>)
                  </li>
                </template>
              </ul>
            </details>
          </div>
        </template>
      </section>
    </main>
  </body>
</html>
